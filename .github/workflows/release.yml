name: Release

on:
    release:
        types:
            - published

env:
    IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/otelcol-nats

permissions:
    contents: write
    packages: write

jobs:
    build:
        name: Build ${{ matrix.goarch }} artifacts
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-24.04
                      goarch: amd64
                    - runner: ubuntu-24.04-arm
                      goarch: arm64

        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-depth: 0

            - name: Set up mise
              uses: jdx/mise-action@v4
              with:
                  install: true
                  cache: true

            - name: Build binary
              run: mise run build

            - name: Prepare binary artifact
              run: |
                  mkdir -p dist
                  cp _build/otelcol-nats/otelcol-nats dist/otelcol-nats-linux-${{ matrix.goarch }}
                  chmod +x dist/otelcol-nats-linux-${{ matrix.goarch }}

            - name: Upload binary artifact
              uses: actions/upload-artifact@v7
              with:
                  name: otelcol-nats-linux-${{ matrix.goarch }}
                  path: dist/otelcol-nats-linux-${{ matrix.goarch }}
                  if-no-files-found: error

    publish-image:
        name: Publish multi-platform image
        runs-on: ubuntu-24.04
        needs:
            - build

        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and publish multi-platform image
              run: >-
                  docker buildx build --platform linux/amd64,linux/arm64 --push
                  -t $IMAGE_NAME:${{ github.event.release.tag_name }} -f
                  Containerfile .

    upload-release-assets:
        name: Upload GitHub Release assets
        runs-on: ubuntu-24.04
        needs:
            - build
            - publish-image

        steps:
            - name: Download binary artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: otelcol-nats-linux-*
                  path: release-assets
                  merge-multiple: true

            - name: Generate release checksums
              run: |
                  cd release-assets
                  sha256sum otelcol-nats-linux-amd64 otelcol-nats-linux-arm64 > SHA256SUMS

            - name: Upload assets to existing release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  fail_on_unmatched_files: true
                  overwrite_files: true
                  files: |
                      release-assets/otelcol-nats-linux-amd64
                      release-assets/otelcol-nats-linux-arm64
                      release-assets/SHA256SUMS
